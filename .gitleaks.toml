title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project-specific allowlist"
paths = [
  '''\.env\.example''',
  '''package-lock\.json''',
  '''frontend/package-lock\.json''',
  '''node_modules/''',
  '''\.wrangler/''',
]
regexes = [
  # Placeholder encryption key in .env.example
  '''0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef''',
  # Obvious placeholder values (your_xxx_here, YOUR_XXX_HERE, <XXX>)
  '''(your_[a-z_]+_here|YOUR_[A-Z_]+_HERE|<[A-Z_]+>)''',
]
